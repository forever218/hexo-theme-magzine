
# Site Settings
favicon: /images/favicon.ico # 网站图标,图标建议尺寸为 64x64 或 32x32 像素,图标名字和格式必须为favicon.ico
logo: /images/0.gif  # 作者头像,建议尺寸为 200x200 像素,支持png/jpg/jpeg/svg格式
# 首页图
# Hero Section
hero:
  enable: false  # 是否开启首页图片
  background_image: /images/11.webp
  typing_text: 天接云涛连晓雾，星河欲转千帆舞
  typing_speed: 100
  delete_speed: 50
  pause_duration: 2000
  scroll_hint: 向下滚动探索更多

# Article List 首页文章卡片大小
article_list:
  card_size: normal  # normal or large
  view_mode: "modal"  # 文章浏览方式: "redirect"(跳转模式) 或 "modal"(模态窗口模式)

# Colors 颜色配置
colors:
  primary: '#1a1a1a'
  secondary: '#666666'
  accent: '#ff6b6b' # 主题色
  background: '#ffffff'
  text: '#333333'
  overlay: 'rgba(0, 0, 0, 0.7)'
  tag_background: '#ffffff'  # 首页标签背景色
  card_background: '#ffffff'  # 首页文章卡片背景色

# Typography 字体配置
fonts:
  primary: 'Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'
  secondary: 'Playfair Display, Georgia, serif'
  monospace: 'Fira Code, Monaco, Consolas, monospace'

# Layout 布局配置
layout:
  max_width: 1400px
  sidebar_width: 300px
  content_padding: 2rem

# Social Links 社交链接
social:
  github: https://github.com/forever218
#  twitter: https://twitter.com/yourusername
#  instagram: https://instagram.com/yourusername
#  linkedin: https://linkedin.com/in/yourusername
  email: mailto:3316703158@qq.com
  bilibili: https://space.bilibili.com/82657269

# Navigation Menu 导航菜单
menu:
  首页: /
  关于: /about/
  归档: /archives/
  分类: /categories/
  标签: /tags/
  友链: /link/
  "Language": "#lang-switch" # 语言切换菜单项
  网站:
    示例网站: https://example.com


# Header 头部
# Navigation Bar Style (导航栏样式)
navbar:
  style: "bubble"  # "fill" (填充样式) 或 "bubble" (气泡样式，两边不填充，带圆角)

# Footer 页脚
footer:
  copyright: © 2025 李思然. 保留所有权利.
  custom_html: ""
  # Footer centered image with link (页脚居中图片及链接)
  image:
    enable: true  # 是否显示图片，设为true显示
    src: "https://s21.ax1x.com/2024/08/23/pAFm0cq.png"  # 图片URL
    link: "https://www.upyun.com/?utm_source=lianmeng&utm_medium=referral"  # 图片链接地址
    alt: "Footer Image"  # 图片替代文本
  badges:
      - link: https://hexo.io/ #徽标指向网站链接
        shields: https://npm.elemecdn.com/anzhiyu-blog@2.1.5/img/badge/Frame-Hexo.svg #徽标API
        message: 博客框架为Hexo_v5.4.0 #徽标提示语  
      - link: http://creativecommons.org/licenses/by-nc-sa/4.0/
        shields: https://npm.elemecdn.com/anzhiyu-blog@2.2.0/img/badge/Copyright-BY-NC-SA.svg
        message: 本站采用知识共享署名-非商业性使用-相同方式共享4.0国际许可协议进行许可



# Features (功能)
features:
  dark_mode: true  # 是否开启暗黑模式
  smooth_scroll: true
  back_to_top: true  # 是否开启返回顶部按钮
  loading_animation: true  # 是否开启加载动画，默认开启

# Code Block Settings (代码高亮)
code_block:
  height_limit: 200  # 代码块高度限制，超过此高度显示展开按钮
  enable_folding: true  # 启用代码折叠功能
  max_height: 300px  # 代码块最大高度（像素）
  show_lang: true  # 是否在代码块上方工具栏显示代码语言（默认true）



# Author Card (作者卡片)
author_card:
  enable: true
  avatar:  /images/0.gif
  name: 然
  bio: 人生而自由，却无往不在枷锁之中
  button_text: 关于我
  button_link: /about/
  background_image: "/images/13.jpg"
  width: large # normal or large
  # 作者卡片背景动画
  background_animation:
    enable: false  # 默认为false，启用后会在没有背景图片时显示动态背景
    type: geometric  # 背景动画类型：particles, geometric, gradient
    color_scheme: auto  # 颜色方案：auto（自动跟随主题）、light、dark
    interactive: true  # 是否启用鼠标交互效果
    density: high  # 动画元素密度：low, medium, high



# Comments (optional)
comments:
  enable: false
  type: twikoo  # disqus, gitalk, valine, twikoo
  shortname:
  # Twikoo configuration
  twikoo:
    envId:   # Your environment ID
    region: # Your service region, e.g. ap-guangzhou
    path: window.location.pathname  # Default is window.location.pathname
    visitor: true  # Enable visitor count
    option: # Additional options

# Share buttons (optional)
share:
  enable: true
  options:
    twitter: true
    facebook: true
    linkedin: true
    copy_link: true
    wechat: true
    qq: true
    weibo: true
    option: # Additional options

# Theme Configuration
theme_config:
  # 文章设置
  post:
    excerpt_length: 200  # 文章摘要长度
    read_more: "阅读更多"  # 阅读更多按钮文字
    use_default_cover: true  # 当文章未设置封面时是否使用默认封面
    default_cover: "/images/19.png"  # 默认封面图片路径


  # 统计分析
  analytics:
    enabled: false
    google_analytics_id: ""
    baidu_analytics_id: ""

  # 搜索功能
  search:
    enabled: true
    provider: "local"  # local, algolia
    algolia_app_id: ""
    algolia_api_key: ""
    algolia_index_name: ""



  # 性能优化
  performance:
    # 图片懒加载
    lazyload: true
    # 代码压缩
    minify: true
    # 缓存
    cache: true

# Custom code injection
inject:
  head:
    # Custom CSS
    # - <link rel="stylesheet" href="/css/custom.css" media="defer" onload="this.media='all'">
    - <link rel="stylesheet" href="https://cdn1.tianli0.top/gh/qxchuckle/Post-Summary-AI/chuckle-post-ai.css"> #AI
    - <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  bottom:
    # Custom JavaScript
    # - <script src="/js/xxx"></script>
    - <script src="/js/ai.js"></script> #ai
    - <script src="/js/postai.js"></script> #ai
    #以下是数学公式支持
    - <script src="/js/math-support.js"></script>  # 数学公式
    #以下是鼠标点击效果,仅可启用一个
    - <script src="/js/click-heart.js"></script> # 鼠标点击爱心文字特效
    # - <script src="/js/click-fireworks.js"></script> # 鼠标点击三角烟花特效
    
    #以下是背景动画特效
    - <script src="/js/falling-leaves.js"></script> # 梧桐落叶特效
    #以下是语言切换支持
    - <script src="/js/lang-switch.js"></script> # 语言切换脚本
    
# 翻译功能
# 注意: 本主题没有采用额外的插件来支持翻译主要是因为一方面主题文字量不是很多而且另一方面很多代码中直接写死了中文文本,根本改不了一点一改就报错
# 如果使用插件的话需要在每个文章和页面的front-matter中都添加语言版本的文本,维护起来非常麻烦,而且很多文本是主题自带的,不在文章front-matter中,所以无法通过插件来实现翻译
# 所以翻译使用了最简单粗暴的方式,即在js中直接替换文本内容,所以目前只配置了中文和英语,如果需要其他语言,请大家自行修改lang-switch.js文件中的翻译内容😄😄

# AI摘要配置
ai_summary:
  enable: true  # 是否启用AI摘要功能，默认关闭
  api_key: ""  # DeepSeek API密钥
  summary_directly: false  # 是否直接生成摘要，默认为false（需要点击按钮生成）
  # 其他可选配置
  ai_name: "然-AI"  # AI名称
  ai_introduce: "我是文章辅助AI: 然-AI，一个基于deepseek的强大语言模型，有什么可以帮到您？😊"  # AI介绍语
  ai_version: "deepseekv3"  # AI版本显示
  # 按钮文本
  buttons:
    - "介绍自己"
    - "来点灵感"
    - "生成AI简介"

# Categories Page 分类页样式
categories:
  layout: accordion  # accordion (展开式) or page (跳转式)
  accordion_animation: true  # 是否启用展开/折叠动画
  show_empty_categories: true  # 是否显示没有文章的分类

# Table of Contents (目录) 设置
toc:
  # 当没有目录时的显示方式
  # hide: 隐藏目录侧边栏，并调整主内容区域宽度为全屏
  # placeholder: 保持目录侧边栏占位，但隐藏目录内容
  empty_toc_behavior: placeholder  # hide 或 placeholder


CDN:
  # The CDN provider of internal scripts (主题内部 js 的 cdn 配置)
  # option: local/elemecdn/jsdelivr/unpkg/cdnjs/onmicrosoft/cbd/anheyu/custom
  # Dev version can only choose. ( dev版的主题只能设置为 local )
  internal_provider: local

  # The CDN provider of third party scripts (第三方 js 的 cdn 配置)
  # option: elemecdn/jsdelivr/unpkg/cdnjs/onmicrosoft/cbd/anheyu/custom
  third_party_provider: unpkg

  # Add version number to CDN, true or false
  version: true

  # Custom format
  # For example: https://cdn.staticfile.org/${cdnjs_name}/${version}/${min_cdnjs_file}
  custom_format: # https://npm.elemecdn.com/${name}@latest/${file}


  option: